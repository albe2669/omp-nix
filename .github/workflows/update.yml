name: Update omp Version

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    outputs:
      update_needed: ${{ steps.check.outputs.update_needed }}
      current_version: ${{ steps.check.outputs.current_version }}
      latest_version: ${{ steps.check.outputs.latest_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea39d1fcd72d3a9ff1a5 # v4.2.2

      - name: Setup Nix
        uses: cachix/install-nix-action@08dcb3a5e62fa31e9da7676404843d9c46480c4 # v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Check for updates
        id: check
        run: |
          if ./.github/scripts/update.sh --check; then
            echo "update_needed=false" >> $GITHUB_OUTPUT
          else
            CURRENT_VERSION=$(jq -r '.version' pkgs/omp/sources.json)
            LATEST_VERSION=$(curl -sf \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/can1357/oh-my-pi/releases/latest" \
              | jq -r '.tag_name | ltrimstr("v")')
            echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "latest=$LATEST_VERSION" >> $GITHUB_OUTPUT
            echo "update_needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Update version and hashes
        if: steps.check.outputs.update_needed == 'true'
        run: |
          ./.github/scripts/update.sh

      - name: Create Pull Request
        if: steps.check.outputs.update_needed == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@271a8b034526271d01e76c5df6d8c2c9d49a8f8 # v7.0.6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update omp to v${{ steps.check.outputs.latest_version }}"
          title: "chore: update omp to v${{ steps.check.outputs.latest_version }}"
          body: |
            ## Automated omp Update

            Updates oh-my-pi from `v${{ steps.check.outputs.current_version }}` to `v${{ steps.check.outputs.latest_version }}`.

            ### Changes
            - Updated `version` in `pkgs/omp/sources.json`
            - Updated source hash (`srcHash`)
            - Updated cargo hash (`cargoHash`)
            - Updated per-platform bun checksums and bun source hashes
            - Updated `flake.lock`

            ### Verification
            - ✅ Hashes computed via `nix-prefetch-url` and FOD builds
            - ✅ Build verified by the `build.yml` workflow on this PR

            ---

            To test locally:
            ```bash
            nix build .#omp
            ./result/bin/omp --version
            ```

            This PR was automatically generated by the update workflow.
          branch: update-omp-${{ steps.check.outputs.latest_version }}
          delete-branch: true
          labels: |
            dependencies
            automated

      - name: Enable Auto-Merge
        if: steps.check.outputs.update_needed == 'true' && steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash --delete-branch
