name: Update omp Version

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Job 1: Check for updates & compute platform-independent hashes ────────
  # srcHash, cargoHash, and all bunSrcHashes are platform-independent.
  # The bunChecksum (FOD hash of `bun install` output) is platform-specific
  # because node_modules contains platform-native binaries (e.g.
  # @biomejs/cli-linux-x64). It's computed in the next job on a matrix.
  check:
    runs-on: ubuntu-latest
    outputs:
      update_needed: ${{ steps.check.outputs.update_needed }}
      current_version: ${{ steps.check.outputs.current_version }}
      latest_version: ${{ steps.check.outputs.latest_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Check for updates
        id: check
        run: |
          if ./.github/scripts/update.sh --check; then
            echo "update_needed=false" >> $GITHUB_OUTPUT
          else
            CURRENT_VERSION=$(jq -r '.version' pkgs/omp/sources.json)
            LATEST_VERSION=$(curl -sf \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/can1357/oh-my-pi/releases/latest" \
              | jq -r '.tag_name | ltrimstr("v")')
            echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
            echo "update_needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Update version, srcHash, bunSrcHashes, cargoHash
        if: steps.check.outputs.update_needed == 'true'
        run: ./.github/scripts/update.sh --no-bun-checksum

      - name: Upload sources.json
        if: steps.check.outputs.update_needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sources-base
          path: pkgs/omp/sources.json

  # ── Job 2: Compute platform-specific bunChecksums ──────────────────────
  # bunChecksum is the FOD hash of `bun install` output, which includes
  # platform-native binaries. Each runner computes only its own platform.
  compute-checksums:
    needs: check
    if: needs.check.outputs.update_needed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            nix-system: x86_64-linux
          - os: macos-latest
            nix-system: aarch64-darwin
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download sources.json
        uses: actions/download-artifact@v4
        with:
          name: sources-base
          path: pkgs/omp/

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Compute bunChecksum for ${{ matrix.nix-system }}
        run: ./.github/scripts/update.sh --bun-checksum-only ${{ matrix.nix-system }}

      - name: Copy sources.json
        run: cp pkgs/omp/sources.json ${{ matrix.nix-system }}.json

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: checksum-${{ matrix.nix-system }}
          path: ${{ matrix.nix-system }}.json

  # ── Job 3: Merge all checksums, update flake.lock, create PR ──────────
  merge-and-pr:
    needs: [check, compute-checksums]
    if: needs.check.outputs.update_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download base sources.json
        uses: actions/download-artifact@v4
        with:
          name: sources-base
          path: pkgs/omp/

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Merge all checksums
        uses: actions/download-artifact@v4
        with:
          pattern: checksum-*
          path: checksums/
          merge-multiple: false

      - name: Apply checksums to sources.json
        run: |
          for system in x86_64-linux aarch64-darwin; do
            file="checksums/checksum-$system/$system.json"
            if [ -f "$file" ]; then
              hash=$(jq -r --arg sys "$system" '.platforms[$sys].bunChecksum' "$file")
              tmp=$(mktemp)
              jq --arg sys "$system" --arg h "$hash" '.platforms[$sys].bunChecksum = $h' pkgs/omp/sources.json > "$tmp"
              mv "$tmp" pkgs/omp/sources.json
              echo "  $system: $hash"
            fi
          done

      - name: Update flake.lock
        run: nix flake update

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update omp to v${{ needs.check.outputs.latest_version }}"
          title: "chore: update omp to v${{ needs.check.outputs.latest_version }}"
          body: |
            ## Automated omp Update

            Updates oh-my-pi from `v${{ needs.check.outputs.current_version }}` to `v${{ needs.check.outputs.latest_version }}`.

            ### Changes
            - Updated `version` in `pkgs/omp/sources.json`
            - Updated source hash (`srcHash`)
            - Updated cargo hash (`cargoHash`)
            - Updated per-platform bun source hashes (`bunSrcHash`)
            - Updated per-platform bun checksums (`bunChecksum`) — computed on a Linux + macOS matrix
            - Updated `flake.lock`

            ### Verification
            - ✅ Hashes computed via `nix store prefetch-file` and FOD builds
            - ✅ Build verified by the `Build and Test` workflow on this PR

            ---

            To test locally:
            ```bash
            nix build .#omp
            ./result/bin/omp --version
            ```

            This PR was automatically generated by the update workflow.
          branch: update-omp-${{ needs.check.outputs.latest_version }}
          delete-branch: true
          labels: |
            dependencies
            automated

      - name: Enable Auto-Merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash --delete-branch
