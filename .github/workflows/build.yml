name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'pkgs/**'
      - 'modules/**'
      - 'lib/**'
  workflow_run:
    workflows: ["Update omp Version"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea39d1fcd72d3a9ff1a5 # v4.2.2

      - name: Install Nix
        uses: cachix/install-nix-action@08dcb3a5e62fa31e9da7676404843d9c46480c4 # v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Check flake
        run: nix flake check --no-build

      - name: Build omp
        run: nix build .#omp --print-build-logs

      - name: Verify binary
        run: ./result/bin/omp --version
